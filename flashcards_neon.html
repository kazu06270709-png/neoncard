/* ---------------- Card list view ---------------- */
function CardListView({ cards, onDelete, onEdit, onToggleFlag, onReorder }){
  const [previewCard, setPreviewCard] = useState(null);
  const [previewSide, setPreviewSide] = useState('q');
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const [searchText, setSearchText] = useState('');
  const [sortMode, setSortMode] = useState('default'); // default | weak | mastered
  const touchState = useRef({});

  // 検索・ソート適用後のカード
  let viewCards = cards;
  if(searchText.trim()){
    const q = searchText.trim().toLowerCase();
    viewCards = viewCards.filter(c =>
      (c.q.type==='text' && c.q.content.toLowerCase().includes(q)) ||
      (c.a.type==='text' && c.a.content.toLowerCase().includes(q))
    );
  }
  if(sortMode==='weak'){
    viewCards = [...viewCards].sort((a,b)=>masteryScore(a)-masteryScore(b));
  }else if(sortMode==='mastered'){
    viewCards = [...viewCards].sort((a,b)=>masteryScore(b)-masteryScore(a));
  }
  const isFiltered = searchText.trim() || sortMode!=='default';

  if(cards.length===0){
    return React.createElement('div',{className:'empty'},
      React.createElement('span',{className:'display'}, 'カードがありません'),
      '手入力か、写真からカードを作りましょう'
    );
  }

  function label(side){ return side.type==='text' ? side.content : '［画像］'; }
  function thumb(side){
    if(side.type==='image') return React.createElement('img',{className:'thumb', src:side.content});
    return React.createElement('div',{className:'thumb-text'}, 'Aa');
  }

  function doReorder(fromId, toId){
    if(isFiltered) return; // 検索・ソート中は並び替え禁止
    if(!fromId||!toId||fromId===toId) return;
    const fi = cards.findIndex(c=>c.id===fromId);
    const ti = cards.findIndex(c=>c.id===toId);
    if(fi<0||ti<0) return;
    const next=[...cards];
    const [moved]=next.splice(fi,1);
    next.splice(ti,0,moved);
    onReorder(next);
  }

  /* desktop drag */
  function onDragStart(e,id){ setDragId(id); e.dataTransfer&&(e.dataTransfer.effectAllowed='move'); }
  function onDragOver(e,id){ e.preventDefault(); id!==dragId&&setDragOverId(id); }
  function onDrop(e,id){ e.preventDefault(); doReorder(dragId,id); setDragId(null); setDragOverId(null); }
  function onDragEnd(){ setDragId(null); setDragOverId(null); }

  /* mobile touch drag */
  function onTouchStartDrag(e,id){
    const t=e.touches[0];
    touchState.current={id, startY:t.clientY, startX:t.clientX, moved:false};
    setDragId(id);
  }
  function onTouchMoveDrag(e){
    const ts=touchState.current; if(!ts.id) return;
    const t=e.touches[0];
    if(!ts.moved && Math.abs(t.clientY-ts.startY)<6 && Math.abs(t.clientX-ts.startX)<6) return;
    ts.moved=true;
    e.preventDefault();
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const row=el&&el.closest('[data-card-id]');
    if(row){ const oid=row.getAttribute('data-card-id'); if(oid!==ts.id) setDragOverId(oid); }
  }
  function onTouchEndDrag(){
    const {id,moved}=touchState.current;
    if(moved && dragOverId && id!==dragOverId) doReorder(id,dragOverId);
    setDragId(null); setDragOverId(null); touchState.current={};
  }

  return React.createElement(React.Fragment, null,
    /* 検索・ソートバー */
    React.createElement('div',{style:{display:'flex', flexDirection:'column', gap:8, marginBottom:4}},
      React.createElement('input',{
        type:'text', placeholder:'🔍 カードを検索…',
        value:searchText, onChange:e=>setSearchText(e.target.value)
      }),
      React.createElement('div',{style:{display:'flex', gap:6}},
        React.createElement('button',{className:'ss-pill'+(sortMode==='default'?' active':''), onClick:()=>setSortMode('default')},'登録順'),
        React.createElement('button',{className:'ss-pill'+(sortMode==='weak'?' active':''), onClick:()=>setSortMode('weak')},'苦手順'),
        React.createElement('button',{className:'ss-pill'+(sortMode==='mastered'?' active':''), onClick:()=>setSortMode('mastered')},'習得順')
      ),
      isFiltered && React.createElement('div',{style:{fontSize:11, color:'var(--text-soft)'}},
        viewCards.length+'枚を表示中'+(isFiltered?'（並び替え・削除は「登録順」で検索なしの時のみ）':'')
      )
    ),
    React.createElement('div',{className:'deck-list'},
      viewCards.map(c => React.createElement('div',{
        className:'card-row drag-row'+(c.id===dragId?' dragging':'')+(c.id===dragOverId?' drag-over':''),
        key:c.id, 'data-card-id':c.id,
        draggable:true,
        onDragStart:e=>onDragStart(e,c.id),
        onDragOver:e=>onDragOver(e,c.id),
        onDrop:e=>onDrop(e,c.id),
        onDragEnd
      },
        React.createElement('div',{
          className:'drag-handle',
          onTouchStart:e=>onTouchStartDrag(e,c.id),
          onTouchMove:onTouchMoveDrag,
          onTouchEnd:onTouchEndDrag
        },'⠿'),
        React.createElement('div',{style:{cursor:'pointer',flexShrink:0}, onClick:()=>{setPreviewCard(c);setPreviewSide('q');}},
          thumb(c.q)
        ),
        React.createElement('div',{className:'pair',style:{cursor:'pointer'}, onClick:()=>{setPreviewCard(c);setPreviewSide('q');}},
          React.createElement('div',{className:'q-line'}, label(c.q)),
          React.createElement('div',{className:'a-line'}, '→ '+label(c.a))
        ),
        (function(){
          const m = masteryLabel(c);
          const seen = c.seenCount||0;
          const acc = seen>0 ? Math.round((c.correctCount||0)/seen*100) : null;
          return React.createElement('span',{
            className:'review-badge',
            style:{color:m.color, borderColor:m.color, flexShrink:0}
          }, acc===null ? m.text : m.text+' '+acc+'%');
        })(),
        React.createElement('button',{className:'flag-btn'+(c.flagged?' flagged':''), onClick:()=>onToggleFlag(c.id)},'⚑'),
        React.createElement('button',{className:'mini-del',style:{color:'var(--cyan)'}, onClick:()=>onEdit(c)},'✎'),
        React.createElement('button',{className:'mini-del', onClick:()=>{if(confirm('削除しますか？'))onDelete(c.id);}},'✕')
      ))
    ),

    previewCard && React.createElement('div',{className:'modal-backdrop', onClick:()=>setPreviewCard(null)},
      React.createElement('div',{className:'modal-panel', onClick:e=>e.stopPropagation()},
        React.createElement('div',{className:'modal-head'},
          React.createElement('div',{style:{display:'flex',gap:6}},
            React.createElement('button',{
              style:{padding:'6px 16px',borderRadius:8,border:'1.5px solid var(--cyan)',cursor:'pointer',
                background:previewSide==='q'?'rgba(0,245,255,0.12)':'transparent',
                color:'var(--cyan)',fontWeight:700,fontSize:13},
              onClick:()=>setPreviewSide('q')
            },'表'),
            React.createElement('button',{
              style:{padding:'6px 16px',borderRadius:8,border:'1.5px solid var(--pink)',cursor:'pointer',
                background:previewSide==='a'?'rgba(255,31,179,0.12)':'transparent',
                color:'var(--pink)',fontWeight:700,fontSize:13},
              onClick:()=>setPreviewSide('a')
            },'裏')
          ),
          React.createElement('button',{className:'modal-close', onClick:()=>setPreviewCard(null)},'✕')
        ),
        React.createElement('div',{className:'card-preview-content'},
          previewCard[previewSide].type==='image'
            ? React.createElement('img',{src:previewCard[previewSide].content,
                style:{width:'100%',borderRadius:10,display:'block',maxHeight:'55vh',objectFit:'contain'}})
            : React.createElement('div',{className:'card-preview-text'}, previewCard[previewSide].content)
        ),
        React.createElement('div',{style:{display:'flex',gap:8,marginTop:4}},
          React.createElement('button',{className:'btn-neon btn-block',style:{padding:'12px 0'},
            onClick:()=>{onEdit(previewCard);setPreviewCard(null);}
          },'✎ 編集する'),
          React.createElement('span',{className:'review-badge'+(isDue(previewCard)?' due':''),style:{alignSelf:'center',flexShrink:0}},
            nextReviewLabel(previewCard))
        )
      )
    )
  );
}

/* ---------------- Study mode wrapper ---------------- */
function StudyMode({ deckMeta, studyMode, onBack }){
  const [cards, setCards] = useState(null);
  const [lastWrongIds, setLastWrongIds] = useState([]);
  const [settings, setSettings] = useState(null);
  useEffect(()=>{ (async()=>{
    const [{ cards: loadedCards }, wrongIds] = await Promise.all([
      loadDeckCards(deckMeta.id),
      getJSON(lastWrongKey(deckMeta.id), [])
    ]);
    setCards(loadedCards); setLastWrongIds(wrongIds);
  })(); },[deckMeta.id]);
  if(cards===null) return React.createElement('div',{style:{padding:'60px 20px',textAlign:'center',color:'#82829A',fontSize:13}},'読み込み中…');
  let targetCards=cards;
  if(studyMode==='due') targetCards=cards.filter(isDue);
  else if(studyMode==='flagged') targetCards=cards.filter(c=>c.flagged);
  else if(studyMode==='wrong') targetCards=cards.filter(c=>lastWrongIds.includes(c.id));
  if(!settings){
    return React.createElement(StudySettingsScreen,{deckName:deckMeta.name,cards:targetCards,studyMode,onBack,onStart:s=>setSettings(s)});
  }
  const baseCards = settings.sectionCards || targetCards;
  let finalCards;
  if(settings.order==='order'){
    finalCards = baseCards;
  }else if(settings.order==='weak'){
    // 苦手順(習熟度が低い順)に並べ、同スコアはシャッフル
    finalCards = shuffle(baseCards).sort((a,b)=>masteryScore(a)-masteryScore(b));
  }else{
    finalCards = shuffle(baseCards);
  }
  finalCards = finalCards.slice(0, settings.count);
  if(settings.quizMode==='quiz4'){
    return React.createElement(Quiz4Runner,{deckName:deckMeta.name,deckId:deckMeta.id,cards:finalCards,allCards:cards,reverse:settings.reverse,onBack:()=>setSettings(null)});
  }
  if(settings.quizMode==='typing'){
    return React.createElement(TypingRunner,{deckName:deckMeta.name,deckId:deckMeta.id,cards:finalCards,reverse:settings.reverse,onBack:()=>setSettings(null)});
  }
  return React.createElement(StudyRunner,{deckName:deckMeta.name,deckId:deckMeta.id,cards:finalCards,dueOnly:studyMode==='due',isTimeAttack:studyMode==='time',reverse:settings.reverse,onBack:()=>setSettings(null)});
}

/* ---------------- 4択クイズ Runner ---------------- */
function Quiz4Runner({ deckName, deckId, cards, allCards, reverse, onBack }){
  const [queue]=useState(()=>cards);
  const [idx,setIdx]=useState(0);
  const [choices,setChoices]=useState([]);
  const [selected,setSelected]=useState(null);
  const [knownCount,setKnownCount]=useState(0);
  const [wrongCards,setWrongCards]=useState([]);
  const savedRef=useRef(false);
  const current=queue[idx];
  const finished=idx>=queue.length;
  useEffect(()=>{
    if(!current) return;
    const correct=reverse?current.q:current.a;
    if(correct.type!=='text'){ setChoices([]); return; }
    const pool=allCards.filter(c=>c.id!==current.id&&(reverse?c.q:c.a).type==='text');
    const wrong3=shuffle(pool).slice(0,3).map(c=>reverse?c.q:c.a);
    setChoices(shuffle([correct,...wrong3])); setSelected(null);
  },[idx]);
  useEffect(()=>{
    if(finished&&deckId&&queue.length>0&&!savedRef.current){
      savedRef.current=true;
      setJSON(lastWrongKey(deckId), wrongCards.map(c=>c.id));
    }
  },[finished]);
  function selectChoice(ch){
    if(selected!==null) return;
    const correct=reverse?current.q:current.a;
    setSelected(ch);
    const ok=ch.content===correct.content;
    if(ok) setKnownCount(c=>c+1); else setWrongCards(w=>[...w,current]);
    if(deckId&&current) setJSON(cardKey(deckId,current.id),scheduleCard(current,ok));
    setTimeout(()=>{ setSelected(null); setIdx(i=>i+1); },900);
  }
  if(finished){
    const pct=Math.round(knownCount/queue.length*100);
    const allKnown=wrongCards.length===0;
    return React.createElement('div',null,
      allKnown && React.createElement(Confetti),
      React.createElement('div',{className:'topbar'},React.createElement('button',{className:'back-btn',onClick:onBack},'←'),React.createElement('div',{className:'title'},deckName)),
      React.createElement('div',{className:'done-screen'},
        React.createElement('span',{className:'mark'},allKnown?'◎':'○'),
        React.createElement('span',{className:'display'},allKnown?'PERFECT':'4択クイズ 終了'),
        React.createElement('div',{className:'stat-box'},
          React.createElement('div',{className:'stat-label'},'正答率  '+pct+'%  ('+knownCount+' / '+queue.length+')'),
          React.createElement('div',{className:'stat-bar-bg'},React.createElement('div',{className:'stat-bar-fill',style:{width:pct+'%',background:pct>=80?'var(--green)':pct>=50?'var(--cyan)':'var(--red)'}})),
          React.createElement('div',{className:'stat-row'},React.createElement('span',{style:{color:'var(--green)'}},'◯ 正解: '+knownCount),React.createElement('span',{style:{color:'var(--red)'}},'✕ 不正解: '+(queue.length-knownCount)))
        ),
        React.createElement('div',{className:'done-row'},React.createElement('button',{className:'btn-ghost',onClick:onBack},'デッキに戻る'))
      )
    );
  }
  if(!current||choices.length===0) return React.createElement('div',{style:{padding:'60px 20px',textAlign:'center',color:'#82829A',fontSize:13}},choices.length===0?'この問題は4択非対応（画像）です。':'読み込み中…');
  const qSide=reverse?current.a:current.q;
  const correct=reverse?current.q:current.a;
  const pct=Math.round(idx/queue.length*100);
  return React.createElement('div',null,
    React.createElement('div',{className:'topbar'},React.createElement('button',{className:'back-btn',onClick:onBack},'←'),React.createElement('div',{className:'title'},deckName)),
    React.createElement('div',{className:'progress-bar'},React.createElement('div',{className:'progress-fill',style:{width:pct+'%'}})),
    React.createElement('div',{style:{fontSize:11,color:'#82829A',textAlign:'right',marginTop:2}},''+(idx+1)+' / '+queue.length),
    React.createElement('div',{className:'quiz4-question'},
      qSide.type==='image'?React.createElement('img',{src:qSide.content,style:{maxWidth:'100%',maxHeight:'34vh',objectFit:'contain',borderRadius:10}}):React.createElement('div',{className:'quiz4-q-text'},qSide.content)
    ),
    React.createElement('div',{className:'quiz4-choices'},
      choices.map(function(ch,i){
        var state='idle';
        if(selected!==null){ if(ch.content===correct.content) state='correct'; else if(ch===selected) state='wrong'; }
        return React.createElement('button',{key:i,className:'quiz4-choice choice-'+state,onClick:()=>selectChoice(ch)},ch.type==='image'?React.createElement('img',{src:ch.content,style:{maxWidth:'100%',maxHeight:80,objectFit:'contain',borderRadius:6}}):ch.content);
      })
    )
  );
}

/* ---------------- Study runner: flip + swipe ---------------- */
function StudyRunner({ deckName, deckId, cards, dueOnly, isTimeAttack, reverse, onBack, multiDeck }){
  const TIME_LIMIT = 15; // seconds per card in time attack
  const [queue, setQueue] = useState(()=>shuffle(cards));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [retryCards, setRetryCards] = useState([]);
  const [knownCount, setKnownCount] = useState(0);
  const [round, setRound] = useState(1);
  const [dragX, setDragX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [timeLeft, setTimeLeft] = useState(TIME_LIMIT);
  const [zoomedImg, setZoomedImg] = useState(null);

  const startXRef = useRef(0);
  const lockRef = useRef(false);
  const lastTapRef = useRef(0);
  const timerRef = useRef(null);
  const savedRef = useRef(false); // セッション重複保存防止
  const historyRef = useRef([]); // 戻る用の履歴
  const startTimeRef = useRef(Date.now()); // 学習時間計測

  // 終了時に学習時間を記録
  useEffect(()=>{
    return ()=>{
      const sec = Math.round((Date.now()-startTimeRef.current)/1000);
      if(sec > 5) addStudyTime(sec);
    };
  },[]);

  function undoLast(){
    if(lockRef.current) return;
    const last = historyRef.current.pop();
    if(!last) { toast.fire('これ以上戻れません'); return; }
    // カウントを巻き戻す
    if(last.known) setKnownCount(c=>Math.max(0,c-1));
    else setRetryCards(r => r.slice(0,-1));
    // カードの学習記録を判定前の状態に戻す
    const targetDeckId = multiDeck ? last.cardBefore._deckId : deckId;
    if(targetDeckId){
      const restored = {...last.cardBefore};
      delete restored._deckId; delete restored._deckName;
      setJSON(cardKey(targetDeckId, restored.id), restored);
    }
    setFlipped(false);
    setDragX(0);
    setIdx(last.idx);
    toast.fire('1問戻りました');
  }

  const current = queue[idx];
  const finished = idx >= queue.length;

  // セッション記録 & 不正解カードIDを保存
  useEffect(()=>{
    if(finished && deckId && queue.length>0 && !savedRef.current){
      savedRef.current = true;
      saveSession(deckId, { total: queue.length, known: knownCount });
      // 不正解カードIDを保存(次回「前回の不正解」ボタンで使う)
      const wrongIds = retryCards.map(c=>c.id);
      setJSON(lastWrongKey(deckId), wrongIds);
    }
  },[finished]);

  // タイムアタック用タイマー
  useEffect(()=>{
    if(!isTimeAttack || finished || zoomedImg) return;
    setTimeLeft(TIME_LIMIT);
    timerRef.current = setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){
          clearInterval(timerRef.current);
          return 0;
        }
        return t-1;
      });
    }, 1000);
    return ()=> clearInterval(timerRef.current);
  },[idx, isTimeAttack, finished]);

  // タイムアウト検知: timeLeftが0になったら不正解扱い
  useEffect(()=>{
    if(isTimeAttack && timeLeft===0 && !finished && !lockRef.current){
      triggerSwipe(false);
    }
  },[timeLeft]);

  function next(known){
    if(lockRef.current) return;
    lockRef.current = true;
    if(isTimeAttack) clearInterval(timerRef.current);
    // 戻る用の履歴を記録(判定前のカード状態を保存)
    historyRef.current.push({ idx, known, cardBefore: {...current} });
    if(known) setKnownCount(c=>c+1);
    else setRetryCards(r => [...r, current]);
    if(current){
      const targetDeckId = multiDeck ? current._deckId : deckId;
      if(targetDeckId){
        const updated = scheduleCard(current, known);
        // マルチデッキ用の一時プロパティは保存しない
        delete updated._deckId; delete updated._deckName;
        setJSON(cardKey(targetDeckId, current.id), updated);
      }
    }
    setTimeout(()=>{
      setFlipped(false);
      setIdx(i => i+1);
      setDragX(0);
      lockRef.current = false;
    }, 200);
  }

  function triggerSwipe(known){
    setDragX(known ? 600 : -600);
    setTimeout(()=> next(known), 180);
  }

  function onPointerDown(e){
    if(zoomedImg) return;
    setDragging(true);
    startXRef.current = e.clientX;
    try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(err){}
  }
  function onPointerMove(e){
    if(!dragging) return;
    setDragX(e.clientX - startXRef.current);
  }
  function onPointerUp(e){
    if(!dragging) return;
    setDragging(false);
    const delta = e.clientX - startXRef.current;
    const threshold = 85;
    if(Math.abs(delta) < 8){
      const now = Date.now();
      const side = flipped ? current.a : current.q;
      if(now - lastTapRef.current < 280 && side.type === 'image'){
        setZoomedImg(side.content); setDragX(0);
      } else {
        setFlipped(f => !f); setDragX(0);
      }
      lastTapRef.current = now;
    } else if(delta > threshold){ triggerSwipe(true);
    } else if(delta < -threshold){ triggerSwipe(false);
    } else { setDragX(0); }
  }

  function restartWithRetries(){
    setQueue(shuffle(retryCards)); setRetryCards([]);
    setIdx(0); setFlipped(false); setDragX(0); setKnownCount(0);
    setRound(r=>r+1);
  }
  function restartAll(){
    setQueue(shuffle(cards)); setRetryCards([]);
    setIdx(0); setFlipped(false); setDragX(0); setKnownCount(0);
    setRound(1);
  }

  if(cards.length===0){
    return React.createElement('div', null,
      React.createElement('div',{className:'topbar'},
        React.createElement('button',{className:'back-btn', onClick:onBack}, '←'),
        React.createElement('div',{className:'title'}, deckName)
      ),
      React.createElement('div',{className:'empty'},
        React.createElement('span',{className:'display'}, dueOnly?'今日の復習はありません':'カードがありません'),
        dueOnly ? '全て期日内です。お疲れさまでした。' : ''
      )
    );
  }

  /* 完了画面 */
  if(finished){
    const total = queue.length;
    const pct = Math.round((knownCount/total)*100);
    const allKnown = retryCards.length===0;
    return React.createElement('div',null,
      React.createElement('div',{className:'topbar'},
        React.createElement('button',{className:'back-btn',onClick:onBack},'←'),
        React.createElement('div',{className:'title'},deckName)
      ),
      allKnown && React.createElement(Confetti),
      React.createElement('div',{className:'done-screen'},
        React.createElement('span',{className:'mark'},allKnown?'◎':'○'),
        React.createElement('span',{className:'display'},isTimeAttack?'TIME ATTACK 終了':allKnown?'COMPLETE':`ROUND ${round} 終了`),
        React.createElement('div',{className:'stat-box'},
          React.createElement('div',{className:'stat-label'},`正答率  ${pct}%  (${knownCount} / ${total})`),
          React.createElement('div',{className:'stat-bar-bg'},
            React.createElement('div',{className:'stat-bar-fill',style:{width:pct+'%',background:pct>=80?'var(--green)':pct>=50?'var(--cyan)':'var(--red)'}})
          ),
          React.createElement('div',{className:'stat-row'},
            React.createElement('span',{style:{color:'var(--green)'}},`◯ おぼえた: ${knownCount}`),
            React.createElement('span',{style:{color:'var(--red)'}},`✕ まだ: ${total-knownCount}`)
          )
        ),
        React.createElement('div',{className:'done-row'},
          !allKnown && React.createElement('button',{className:'btn-neon',style:{borderColor:'var(--red)',color:'var(--red)'},onClick:restartWithRetries},`✕ 不正解 ${retryCards.length}枚をもう一周`),
          React.createElement('button',{className:'btn-ghost',onClick:restartAll},'最初から')
        )
      )
    );
  }

  function renderFace(side, typeLabel){
    const isImg = side.type === 'image';
    return React.createElement('div',{className:'face '+(typeLabel==='Q'?'front':'back')+(isImg?' has-image':'')},
      React.createElement('div',{className:'face-label'}, typeLabel),
      isImg
        ? React.createElement(React.Fragment, null,
            React.createElement('img',{className:'face-img', src:side.content}),
            React.createElement('button',{
              className:'zoom-tap-btn',
              onPointerDown: e=>{ e.stopPropagation(); },
              onClick: e=>{ e.stopPropagation(); setZoomedImg(side.content); }
            }, '🔍')
          )
        : React.createElement(React.Fragment, null,
            React.createElement('div',{className:'face-text'}, side.content),
            React.createElement('button',{
              className:'zoom-tap-btn', style:{bottom:10, right:10},
              onPointerDown: e=>{ e.stopPropagation(); },
              onClick: e=>{ e.stopPropagation(); speakText(side.content); }
            }, '🔊')
          )
    );
  }

  const progressPct = Math.round((idx/queue.length)*100);
  const rot = Math.max(-14, Math.min(14, dragX/14));
  const timerPct = isTimeAttack ? (timeLeft/TIME_LIMIT)*100 : 100;
  const timerColor = timeLeft<=5 ? 'var(--red)' : timeLeft<=10 ? 'var(--yellow)' : 'var(--cyan)';

  return React.createElement('div', null,
    React.createElement('div',{className:'topbar'},
      React.createElement('button',{className:'back-btn', onClick:onBack}, '←'),
      React.createElement('div',{className:'title'}, deckName+(round>1?` (R${round})`:'')),
      isTimeAttack && React.createElement('div',{className:'timer-display', style:{color:timerColor}}, timeLeft+'s')
    ),
    /* 通常進捗バー */
    React.createElement('div',{className:'progress-bar'}, React.createElement('div',{className:'progress-fill', style:{width:progressPct+'%'}})),
    /* タイムアタック残り時間バー */
    isTimeAttack && React.createElement('div',{className:'progress-bar', style:{marginTop:3}},
      React.createElement('div',{className:'progress-fill', style:{width:timerPct+'%', background:timerColor, transition:'width 1s linear'}})
    ),
    React.createElement('div',{style:{fontSize:11, color:'#82829A', textAlign:'right', marginTop:2}}, `${idx+1} / ${queue.length}`),

    React.createElement('div',{className:'study-stage'},
      React.createElement('div',{
        className:'card-flip-area',
        onPointerDown, onPointerMove, onPointerUp, onPointerCancel:onPointerUp
      },
        React.createElement('div',{
          className:'swipe-card'+(dragging?' dragging':''),
          style:{ transform:`translateX(${dragX}px) rotate(${rot}deg)` }
        },
          React.createElement('span',{className:'swipe-stamp right', style:{opacity:dragX>20?Math.min(dragX/70,1):0}}, 'OK'),
          React.createElement('span',{className:'swipe-stamp left', style:{opacity:dragX<-20?Math.min(-dragX/70,1):0}}, 'NG'),
          React.createElement('div',{className:'flip-inner'+(flipped?' flipped':'')},
            renderFace(reverse ? current.a : current.q, 'Q'),
            renderFace(reverse ? current.q : current.a, 'A')
          )
        )
      ),
      React.createElement('div',{className:'hint'}, 'タップ：めくる　🔍ボタン：画像拡大　左右スワイプ：判定'),
      current.memo && React.createElement(MemoHint, { memo: current.memo })
    ),

    React.createElement('div',{className:'bottom-controls'},
      React.createElement('div',{className:'bottom-controls-inner'},
        React.createElement('button',{className:'ctrl-btn undo-btn', onClick:undoLast, style:{flex:'0 0 60px'}}, '↩'),
        React.createElement('button',{className:'ctrl-btn ctrl-no', onClick:()=>triggerSwipe(false)}, '✕ まだ'),
        React.createElement('button',{className:'ctrl-btn ctrl-yes', onClick:()=>triggerSwipe(true)}, '◯ おぼえた')
      )
    ),

    zoomedImg && React.createElement(TouchZoomModal, { src:zoomedImg, onClose:()=>setZoomedImg(null) })
  );
}
/* ---------------- タイピング入力 Runner ---------------- */
function TypingRunner({ deckName, deckId, cards, reverse, onBack }){
  const [queue] = useState(()=>cards.filter(c=>(reverse?c.q:c.a).type==='text'));
  const [idx, setIdx] = useState(0);
  const [input, setInput] = useState('');
  const [result, setResult] = useState(null); // null | 'correct' | 'wrong'
  const [knownCount, setKnownCount] = useState(0);
  const [wrongCards, setWrongCards] = useState([]);
  const savedRef = useRef(false);
  const inputRef = useRef(null);

  const current = queue[idx];
  const finished = idx >= queue.length;

  useEffect(()=>{
    if(finished && deckId && queue.length>0 && !savedRef.current){
      savedRef.current = true;
      saveSession(deckId, {total:queue.length, known:knownCount});
      setJSON(lastWrongKey(deckId), wrongCards.map(c=>c.id));
    }
  },[finished]);

  function normalize(t){
    return t.trim().toLowerCase().replace(/[\s\u3000]+/g,' ');
  }

  function check(){
    if(result!==null || !input.trim()) return;
    const correct = reverse ? current.q : current.a;
    const userAns = normalize(input);
    const fullAns = normalize(correct.content);
    // あいまい判定: 「・」「、」「,」「/」で区切られた複数の意味のうち1つ合っていれば正解
    const parts = correct.content.split(/[・、,\/]/).map(p=>normalize(p)).filter(p=>p);
    const ok = userAns === fullAns || parts.some(p => p === userAns);
    setResult(ok ? 'correct' : 'wrong');
    if(ok) setKnownCount(c=>c+1);
    else setWrongCards(w=>[...w,current]);
    if(deckId && current) setJSON(cardKey(deckId,current.id), scheduleCard(current, ok));
  }

  function nextCard(){
    setInput(''); setResult(null);
    setIdx(i=>i+1);
    setTimeout(()=>{ if(inputRef.current) inputRef.current.focus(); }, 100);
  }

  if(queue.length===0){
    return React.createElement('div',null,
      React.createElement('div',{className:'topbar'},
        React.createElement('button',{className:'back-btn',onClick:onBack},'←'),
        React.createElement('div',{className:'title'},deckName)
      ),
      React.createElement('div',{className:'empty'},
        React.createElement('span',{className:'display'},'入力モード対応カードなし'),
        '答えがテキストのカードのみ入力モードで使えます'
      )
    );
  }

  if(finished){
    const pct = Math.round(knownCount/queue.length*100);
    const allKnown = wrongCards.length===0;
    return React.createElement('div',null,
      allKnown && React.createElement(Confetti),
      React.createElement('div',{className:'topbar'},
        React.createElement('button',{className:'back-btn',onClick:onBack},'←'),
        React.createElement('div',{className:'title'},deckName)
      ),
      React.createElement('div',{className:'done-screen'},
        React.createElement('span',{className:'mark'},allKnown?'◎':'○'),
        React.createElement('span',{className:'display'},allKnown?'PERFECT':'入力モード 終了'),
        React.createElement('div',{className:'stat-box'},
          React.createElement('div',{className:'stat-label'},`正答率  ${pct}%  (${knownCount} / ${queue.length})`),
          React.createElement('div',{className:'stat-bar-bg'},
            React.createElement('div',{className:'stat-bar-fill',style:{width:pct+'%',background:pct>=80?'var(--green)':pct>=50?'var(--cyan)':'var(--red)'}})
          )
        ),
        React.createElement('div',{className:'done-row'},
          React.createElement('button',{className:'btn-ghost',onClick:onBack},'デッキに戻る')
        )
      )
    );
  }

  const qSide = reverse ? current.a : current.q;
  const correct = reverse ? current.q : current.a;
  const pct = Math.round(idx/queue.length*100);

  return React.createElement('div',null,
    React.createElement('div',{className:'topbar'},
      React.createElement('button',{className:'back-btn',onClick:onBack},'←'),
      React.createElement('div',{className:'title'},deckName)
    ),
    React.createElement('div',{className:'progress-bar'},React.createElement('div',{className:'progress-fill',style:{width:pct+'%'}})),
    React.createElement('div',{style:{fontSize:11,color:'#82829A',textAlign:'right',marginTop:2}},`${idx+1} / ${queue.length}`),

    React.createElement('div',{className:'quiz4-question'},
      qSide.type==='image'
        ? React.createElement('img',{src:qSide.content,style:{maxWidth:'100%',maxHeight:'30vh',objectFit:'contain',borderRadius:10}})
        : React.createElement('div',{className:'quiz4-q-text'},qSide.content)
    ),

    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10,marginTop:8}},
      React.createElement('input',{
        ref: inputRef,
        type:'text', placeholder:'答えを入力…',
        value:input, onChange:e=>setInput(e.target.value),
        onKeyDown:e=>{ if(e.key==='Enter'){ result===null ? check() : nextCard(); } },
        disabled: result!==null && result==='correct',
        style:{fontSize:17, padding:'14px 14px', textAlign:'center',
          borderColor: result==='correct'?'var(--green)':result==='wrong'?'var(--red)':'var(--line)'}
      }),
      result===null
        ? React.createElement('button',{className:'btn-neon btn-block',style:{padding:'14px 0'},disabled:!input.trim(),onClick:check},'判定する')
        : React.createElement(React.Fragment,null,
            React.createElement('div',{
              style:{textAlign:'center', padding:'10px', borderRadius:10, fontWeight:700,
                background: result==='correct'?'rgba(57,255,136,0.1)':'rgba(255,56,96,0.1)',
                color: result==='correct'?'var(--green)':'var(--red)',
                border:'1px solid '+(result==='correct'?'var(--green)':'var(--red)')}
            },
              result==='correct' ? '◯ 正解！' : '✕ 正解: '+correct.content
            ),
            React.createElement('button',{className:'btn-neon green btn-block',style:{padding:'14px 0'},onClick:nextCard},'次へ →')
          )
    )
  );
}

/* ---------------- 完了演出(紙吹雪) ---------------- */

  const pieces = Array.from({length:40},(_,i)=>i);
  const colors = ['#00F5FF','#FF1FB3','#39FF88','#FFE45E','#FF3860'];
  return React.createElement('div',{className:'confetti-wrap'},
    pieces.map(i=>React.createElement('div',{
      key:i, className:'confetti-piece',
      style:{
        left: Math.random()*100+'%',
        background: colors[i%colors.length],
        animationDelay: (Math.random()*0.8)+'s',
        animationDuration: (2+Math.random()*1.5)+'s',
        width: (6+Math.random()*6)+'px',
        height: (6+Math.random()*6)+'px'
      }
    }))
  );
}

function MemoHint({ memo }){
  const [open, setOpen] = useState(false);
  return React.createElement('div',{style:{textAlign:'center',marginTop:4}},
    React.createElement('button',{
      className:'btn-ghost', style:{fontSize:12,padding:'6px 16px'},
      onClick:()=>setOpen(o=>!o)
    }, open ? '💡 ヒントを隠す' : '💡 ヒントを見る'),
    open && React.createElement('div',{className:'memo-hint-box'}, memo)
  );
}

function TouchZoomModal({ src, onClose }) {
  const [scale, setScale] = useState(1);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const touchRef = useRef({ dragging: false, startX: 0, startY: 0, lastX: 0, lastY: 0, startDist: 0 });

  function onTouchStart(e) {
    if (e.touches.length === 1) {
      touchRef.current.dragging = true;
      touchRef.current.startX = e.touches[0].clientX - offset.x;
      touchRef.current.startY = e.touches[0].clientY - offset.y;
    } else if (e.touches.length === 2) {
      touchRef.current.dragging = false;
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      touchRef.current.startDist = dist / scale;
    }
  }

  function onTouchMove(e) {
    if (e.touches.length === 1 && touchRef.current.dragging) {
      const nx = e.touches[0].clientX - touchRef.current.startX;
      const ny = e.touches[0].clientY - touchRef.current.startY;
      setOffset({ x: nx, y: ny });
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const ns = Math.max(1, Math.min(4, dist / touchRef.current.startDist));
      setScale(ns);
    }
  }

  function onTouchEnd() {
    touchRef.current.dragging = false;
    if (scale <= 1.05) {
      setOffset({ x: 0, y: 0 });
      setScale(1);
    }
  }

  return React.createElement('div', { className: 'zoom-modal' },
    React.createElement('button', { className: 'zoom-modal-close', onClick: onClose }, '✕'),
    React.createElement('div', {
      className: 'zoom-container',
      onTouchStart, onTouchMove, onTouchEnd, onTouchCancel: onTouchEnd
    },
      React.createElement('img', {
        className: 'zoom-target-img',
        src: src,
        style: { transform: `translate(${offset.x}px, ${offset.y}px) scale(${scale})` }
      })
    ),
    React.createElement('div', { className: 'zoom-tip-banner' }, '2本指でズーム・1本指で移動可能')
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { err: null }; }
  static getDerivedStateFromError(e){ return { err: e }; }
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{padding:24, color:'#FF8FA8', fontFamily:'sans-serif', fontSize:13, whiteSpace:'pre-wrap', background:'#0A0A10', minHeight:'100vh'}},
        '🚨 エラーが発生しました\n\n' + (this.state.err && (this.state.err.message + '\n' + this.state.err.stack))
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('app')).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
